<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My yoAnime Overlay</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: transparent; font-family: Segoe UI, Arial, sans-serif; }
    #overlay-root {
      position: fixed;
      left: 16px;
      bottom: 16px;
      width: min(420px, calc(100vw - 32px));
      max-height: min(420px, calc(100vh - 32px));
      display: grid;
      gap: 10px;
      padding: 12px;
      color: #f8fafc;
      background: rgba(13, 17, 23, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      overflow: auto;
    }
    button { border: 1px solid #22c55e; background: #15803d; color: white; padding: 8px 10px; border-radius: 6px; cursor: pointer; }
    pre { margin: 0; white-space: pre-wrap; font-size: 12px; line-height: 1.35; }
  </style>
</head>
<body>
  <main id="overlay-root" data-yoanime-interactive="true">
    <strong>Overlay Workspace</strong>
    <button id="scan">Scan Scene</button>
    <pre id="log">Loading...</pre>
  </main>

  <script src="/js/yoAnimeBridge.js"></script>
  <script src="/Runtime/yoAnimeOverlayInteraction.js"></script>
  <script>
    const log = value => {
      document.getElementById("log").textContent =
        typeof value === "string" ? value : JSON.stringify(value, null, 2);
    };

    async function scanScene() {
      const scene = await yoanime.scene.get({
        includeGeometry: true,
        includeShapeType: true,
        includeTags: true
      });

      log(scene.shapes.map(shape => ({
        name: shape.name,
        runtimeNodeId: shape.runtimeNodeId,
        roles: shape.roles,
        x: shape.bounds?.left,
        y: shape.bounds?.top,
        w: shape.bounds?.width,
        h: shape.bounds?.height
      })));
    }

    async function boot() {
      await yoanime.runtime.ready();

      window.yoAnimeOverlayInteraction?.init({
        containerId: "overlay-root",
        interactiveSelectors: ["#overlay-root", "#overlay-root *"]
      });

      yoanime.overlay.onMessage(event => {
        if (event.message?.type === "my-extension.refresh-scene") {
          scanScene().catch(error => log(error.message || String(error)));
        }
      });

      document.getElementById("scan").onclick = () => {
        scanScene().catch(error => log(error.message || String(error)));
      };

      await yoanime.taskpane.postMessage({ type: "my-extension.overlay-ready" });
      log("Ready");
    }

    boot().catch(error => log(error.message || String(error)));
  </script>
</body>
</html>
